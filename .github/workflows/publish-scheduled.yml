name: Publish Scheduled Articles

on:
  # schedule は無効化（承認キュー方式に移行 — 2026-03-12）
  # Zenn AI コンテンツガイドライン対応: publish-queue.yml に統合
  # - cron: '*/30 * * * *'
  workflow_dispatch:  # 手動実行

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish scheduled articles
        uses: x-color/zenn-post-scheduler@v1.0.0
        with:
          path: articles
          target_key: published_at

      - name: Auto-commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: 予約記事を自動公開'
          file_pattern: articles/
