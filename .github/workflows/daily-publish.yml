name: Daily Auto Publish

on:
  # [DEPRECATED] schedule は無効化（承認キュー方式に移行 — 2026-03-12）
  # Zenn AI コンテンツガイドライン対応: publish-queue.yml に統合
  # 注意: 手動実行時も commit_options: '--no-verify' により pre-commit hook が無効
  # - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      count:
        description: '公開本数（デフォルト: 2）'
        required: false
        default: '2'
      dry_run:
        description: 'Dry run（true: 確認のみ）'
        required: false
        default: 'false'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run daily publish script
        id: publish
        run: |
          COUNT="${{ github.event.inputs.count || '2' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"

          if [ "$DRY_RUN" = "true" ]; then
            python3 scripts/daily-publish.py --count "$COUNT" --dry-run
          else
            python3 scripts/daily-publish.py --count "$COUNT"
          fi

      - name: Validate front matter
        run: python3 scripts/validate-frontmatter.py --ci

      - name: Commit and push
        id: commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: 自動公開 — daily-publish.py による定期公開'
          file_pattern: 'articles/*.md scripts/.publish-failures.json'
          commit_options: '--no-verify'

      - name: Notify Discord
        if: steps.publish.outputs.published_count != '' && steps.commit.outputs.changes_detected == 'true'
        env:
          DISCORD_WEBHOOK_CONTENT: ${{ secrets.DISCORD_WEBHOOK_CONTENT }}
          PUBLISHED_SLUGS: ${{ steps.publish.outputs.published_slugs }}
        run: python3 scripts/notify-discord-publish.py
